syntax = "proto3";

service CourseService {
  rpc CreateCourse (CourseRequest) returns (CourseResponse);
  rpc GetCourse (CourseId) returns (CourseResponse);
  rpc GetAllCourses (Empty) returns (CourseList);

  rpc UpdateCourse (CourseUpdateRequest) returns (CourseResponse);
  rpc DeleteCourse (CourseId) returns (DeleteResponse);

  rpc SearchCourses (CourseSearchRequest) returns (CourseList);
}

message CourseRequest {
  string title = 1;
  string description = 2;
  string category = 3;
}

message CourseUpdateRequest {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string category = 4;
}

message CourseResponse {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string category = 4;
}

message CourseId {
  int32 id = 1;
}

message CourseSearchRequest {
  string keyword = 1;
}

message CourseList {
  repeated CourseResponse courses = 1;
}

message DeleteResponse {
  string message = 1;
  bool success = 2;
}

message Empty {}